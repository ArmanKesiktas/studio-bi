services:
  - type: web
    name: studio-bi-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # Render dashboard'dan manuel gireceksin
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: MAX_UPLOAD_SIZE_MB
        value: "50"
      - key: STORAGE_PATH
        value: ./storage
    healthCheckPath: /health
    autoDeploy: true         # GitHub'a push edince otomatik deploy
