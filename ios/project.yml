name: StudioBI
options:
  bundleIdPrefix: com.studiobi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  StudioBI:
    type: application
    platform: iOS
    sources:
      - path: StudioBI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.studiobi.app
        INFOPLIST_FILE: StudioBI/Info.plist
